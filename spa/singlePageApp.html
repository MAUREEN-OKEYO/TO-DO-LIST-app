<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
    <title>Single Page App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #333;
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header-btn {
            margin: 0 10px;
            padding: 10px 20px;
            background-color: #555;
            color: white;
            border: none;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
            border-radius: 5px;
        }
        .header-btn:hover {
            background-color: #777;
        }
        .page {
            display: none;
            margin-top: 150px;
            text-align: center;
        }
        #page1 {
            margin-top: 0;
            display: flex;
            width: 100%;
            height: 100vh;
            background-color: rgb(126, 101, 68);
            padding-top: 150px;
        }
        #hero1 {
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            text-align: left;
            padding-left: 15px;
            margin-left: 25px;
            text-align: center;
        }
        #hero1 h2 {
            font-size: 50px;
            margin-bottom: 20px;
        }
        #hero1 h1 {
            font-size: 100px;
            margin-bottom: 20px;
        }

        img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
        }
        .hire-btn {
            padding: 30px 60px;
            background-color: #555;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 40px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 40px;
            border-radius: 5px;
            margin-right: 10px;
        }
@media (max-width: 768px) {
    #hero1 {
        text-align: center;
        padding: 10px;
        margin: 0;
    }
    #hero1 h1 {
        font-size: 50px;
    }
    #hero1 h2 {
        font-size: 30px;
    }
    img {
        width: 100px;
        height: 100px;
    }
    .hire-btn {
        font-size: 20px;
        padding: 15px 30px;
    }
    .page {
        padding: 20px;
        margin-top: 100px;
    }
    #page1 {
        flex-direction: column;
        align-items: center;
        height: auto;
    }
    html {
        overflow-y: auto;
    }
}
@media (max-width: 480px) {
    .header-btn, .hire-btn, #cv-btn {
        font-size: 14px;
        padding: 10px 20px;
    }
}
        #cv-btn {
            margin-left: 10px;
            background-color: #e9cece;
            color: #161111;
            border: none;
            cursor: pointer;
            margin-top: 40px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 40px;
            border-radius: 5px;
        }
        #cv-btn:hover {
            background-color: #777;
        }
        html {
            overflow-y: hidden;
        }
    </style>    
</head>
<body>
    <nav id="header">
        <button class='header-btn' data-page="page1" aria-label="Go to Home">Home</button>
        <button class='header-btn' data-page="page2" aria-label="Go to About">About</button>
        <button class='header-btn' data-page="page3" aria-label="Go to Services">Services</button>
        <button class='header-btn' data-page="page4" aria-label="Go to Portfolio">Portfolio</button>
        <button class='header-btn' data-page="page5" aria-label="Go to Contact">Contact</button>
    </nav>

    <div id="page1" class="page" style="display: block;">
        <div id="hero1">
            <img src="image.jpg" alt="Profile Picture" style="border-radius: 50%; margin-top: 20px;">
            <h2>Hi I'm Maureen,</h2>
            <h1>A FRONT-END DEVELOPER</h1>
            <button class="hire-btn">Hire Me</button>
            <button id='cv-btn' class="hire-btn">Download CV</button>
        </div>

            <!--<h1>Web Developer</h1>
            <p>I'm a web developer with a passion for creating beautiful and functional websites.</p>
            <p>With a strong background in HTML, CSS, and JavaScript, I can bring your ideas to life.</p>-->


    </div>

    <div id="page2" class="page">
        <h1>Second Page</h1>
    </div>

    <div id="page3" class="page">
        <h1>Third Page</h1>
    </div>

    <div id="page4" class="page">
        <h1>Fourth Page</h1>
    </div>

    <div id="page5" class="page">
        <h1>Fifth Page</h1>
    </div>

    <script>
        function viewPage(page) {
            const targetPage = document.querySelector(`#${page}`);
            if (!targetPage) {
                console.error(`Page with ID "${page}" not found.`);
                return;
            }
            document.querySelectorAll('.page').forEach(function(div) {
                div.style.display = 'none';
            });
            targetPage.style.display = 'block';
        }

        document.querySelectorAll('.header-btn').forEach(function(button) {
            button.onclick = function() {
                viewPage(this.dataset.page);
            };
        });
    </script>
</body>
</html>
